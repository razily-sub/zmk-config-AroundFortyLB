CONFIG_ZMK_KEYBOARD_NAME="AroundForty-LB"
CONFIG_BT_DEVICE_NAME="AroundForty-LB" 
CONFIG_BT_DEVICE_NAME_MAX=16

# ポインティングデバイス（マウス機能）の有効化
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# ハードウェア設定
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_SPI=y
CONFIG_INPUT=y

# PMW3610 ドライバー本体の有効化
# (注意: 個別のCPIや反転の設定は.overlayで行う形式のため、ここでは書きません)
CONFIG_PMW3610=y

# Bluetooth / バッテリー設定
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

# RGB LED Widget 設定
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

# エンコーダーを使わない場合は無効のままにします
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
